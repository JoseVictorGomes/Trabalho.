<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Agendamento Barbearia</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1><strong>BARBEARIA DOIS IRMÃOS</strong></h1>
    <div class="header-botoes">
      <button onclick="controlarJanela('popupMeusAgendamentos')">Meus Agendamentos</button>
      <button onclick="controlarJanela('popupCandidaturaBarbeiro')">Seja um Barbeiro</button>
      <button class="admin-btn" onclick="verificarEShowPainelDono()">Minha Barbearia</button>
    </div>
  </header>

  <div class="popup" id="popupMeusAgendamentos"> 
    <button class="fechar-btn" onclick="controlarJanela()">&times;</button> 
    <h2>Consultar Agendamento</h2>
    <input type="text" id="whatsapp" placeholder="Seu WhatsApp">
    <button onclick="buscarAgendamentos()">Consultar</button>
    <div id="resultadoConsulta"></div>
  </div>

  <div class="popup" id="popupCandidaturaBarbeiro"> 
    <button class="fechar-btn" onclick="controlarJanela()">&times;</button> 
    <h2>Candidatura para Barbeiro</h2>
    <input type="text" id="nomeB" placeholder="Nome">
    <input type="text" id="telB" placeholder="Telefone">
    <input type="text" id="endB" placeholder="Endereço">
    <input type="url" id="currB" placeholder="Link Currículo">
    <button onclick="enviarCandidatura()">Enviar</button> 
    <div id="mensagemBarbeiro" class="mensagem"></div> 
  </div>

  <div class="popup" id="janelaDoDono"> 
    <button class="fechar-btn" onclick="controlarJanela()">&times;</button> 
    
    <div id="telaLogin">
      <h2>Acesso do Proprietário</h2>
      <input type="text" id="userD" placeholder="Usuário">
      <input type="password" id="senhaD" placeholder="Senha">
      <button onclick="fazerLogin()">Entrar</button>
      <div id="erroLogin" style="color: red; margin-top: 10px;"></div>
    </div>

    <div id="painelDono" style="display: none;">
      <h2>Painel de Gestão</h2>
      <button onclick="fazerLogout()" style="background-color: #555;">Sair</button>
      <h3>🗓️ Todos os Agendamentos</h3>
      <div id="listaAged"></div>
      <h3>💼 Currículos Recebidos</h3>
      <div id="listaCand"></div>
    </div>
  </div>

  <div class="container">
    <form id="formAgendar"> 
      <h2>Agende seu horário</h2>
      <input type="text" id="nome" placeholder="Seu Nome" required>
      <input type="text" id="whats" placeholder="Seu WhatsApp" required>
      <select id="hora" required><option value="">Horário...</option></select>
      <select id="barbeiro" required>
        <option value="">Barbeiro...</option>
        <option value="Geraldo">Geraldo</option>
        <option value="Osvaldo">Osvaldo</option>
      </select>
      <button type="submit">Agendar Horário</button>
      <div class="mensagem" id="mensagem"></div>
    </form>
    <div class="horarios"><h2>Horários de Hoje</h2><ul id="listaHorarios"></ul></div>
  </div>

  <script>
    const horasPadrao = ["08:00", "09:00", "10:00", "11:00", "13:00", "14:00", "15:00", "16:00", "17:00", "18:00"];
    let chaveAcesso = null;

    function controlarJanela(idJanela = null) {
      document.querySelectorAll('.popup').forEach(p => p.style.display = 'none');
      document.body.classList.remove('popup-aberto');
      if(idJanela) {
        document.getElementById(idJanela).style.display = 'block';
        document.body.classList.add('popup-aberto');
      }
    }

    function verificarEShowPainelDono() {
      controlarJanela('janelaDoDono');
      document.getElementById("telaLogin").style.display = chaveAcesso ? "none" : "block";
      document.getElementById("painelDono").style.display = chaveAcesso ? "block" : "none";
      if(chaveAcesso) carregarDadosDono();
    }

    async function carregarHorarios() {
      listaHorarios.innerHTML = "";
      document.getElementById("hora").innerHTML = '<option value="">Horário...</option>';
      const resp = await fetch('http://localhost:3000/horarios-ocupados');
      const ocupados = await resp.json();

      horasPadrao.forEach(h => {
        const li = document.createElement("li");
        let texto = `${h}: `, ambosOcupados = true;
        
        ['Geraldo', 'Osvaldo'].forEach(b => {
          const jaFoi = ocupados.find(a => a.hora === h && a.barbeiro === b);
          texto += jaFoi ? ` ${b} (Reservado) ` : ` ${b} (Livre) `;
          if (!jaFoi) ambosOcupados = false;
        });

        li.textContent = texto;
        if (ambosOcupados) li.classList.add("reservado");
        listaHorarios.appendChild(li);

        if (!ambosOcupados) {
          const opt = document.createElement("option");
          opt.value = h; opt.textContent = h;
          document.getElementById("hora").appendChild(opt);
        }
      });
    }

    document.getElementById("formAgendar").addEventListener("submit", async (e) => {
      e.preventDefault();
      const res = await fetch('http://localhost:3000/agendar', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ nome: document.getElementById("nome").value, whats: document.getElementById("whats").value, hora: document.getElementById("hora").value, barbeiro: document.getElementById("barbeiro").value })
      });
      const dados = await res.json();
      document.getElementById("mensagem").textContent = dados.mensagem || dados.erro;
      document.getElementById("mensagem").style.color = res.ok ? "green" : "red";
      if(res.ok) { document.getElementById("formAgendar").reset(); carregarHorarios(); }
    });

    async function buscarAgendamentos() {
      const num = document.getElementById("whatsapp").value;
      if(!num) return;
      const resp = await fetch(`http://localhost:3000/consultar/${num}`);
      const dados = await resp.json();
      const div = document.getElementById("resultadoConsulta");
      div.innerHTML = dados.length ? dados.map(a => `<p>${a.hora} - ${a.nome} (${a.barbeiro}) <button onclick="cancelar('${a.hora}','${a.barbeiro}')">X</button></p>`).join('') : "Nenhum encontrado.";
    }

    async function cancelar(h, b) {
      if(!confirm("Cancelar?")) return;
      await fetch('http://localhost:3000/cancelar', { method: 'DELETE', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ hora: h, barbeiro: b }) });
      buscarAgendamentos(); carregarHorarios();
    }

    async function enviarCandidatura() {
      const res = await fetch('http://localhost:3000/candidatura-barbeiro', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ nome: document.getElementById("nomeB").value, telefone: document.getElementById("telB").value, endereco: document.getElementById("endB").value, curriculo: document.getElementById("currB").value })
      });
      document.getElementById("mensagemBarbeiro").textContent = res.ok ? "Enviado!" : "Erro ao enviar.";
    }

    async function fazerLogin() {
      const res = await fetch('http://localhost:3000/dono/entrar', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ usuario: document.getElementById("userD").value, senha: document.getElementById("senhaD").value })
      });
      const dados = await res.json();
      if(res.ok) { chaveAcesso = dados.chave; verificarEShowPainelDono(); }
      else document.getElementById("erroLogin").textContent = dados.erro;
    }

    async function carregarDadosDono() {
      const rA = await fetch('http://localhost:3000/dono/todos-agendamentos', { headers: { 'Authorization': chaveAcesso } });
      const rC = await fetch('http://localhost:3000/dono/todas-candidaturas', { headers: { 'Authorization': chaveAcesso } });
      document.getElementById("listaAged").innerHTML = (await rA.json()).map(a => `<p>⏰ ${a.hora} - ${a.nome} (${a.barbeiro})</p>`).join('') || "Vazio.";
      document.getElementById("listaCand").innerHTML = (await rC.json()).map(c => `<p>👤 ${c.nome} - Tel: ${c.telefone}</p>`).join('') || "Vazio.";
    }

    function fazerLogout() { chaveAcesso = null; controlarJanela(); }
    carregarHorarios();
  </script>
</body>
</html>
